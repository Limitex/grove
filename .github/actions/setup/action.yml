name: Setup
description: Common setup for Grove CI and release workflows

inputs:
  rust-components:
    description: "Rust toolchain components to install (e.g. 'rustfmt, clippy')"
    default: ""
  rust-targets:
    description: "Rust targets to install (e.g. 'x86_64-unknown-linux-gnu')"
    default: ""

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: pnpm
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: ${{ inputs.rust-components }}
        targets: ${{ inputs.rust-targets }}
    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: src-tauri
    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
    - shell: bash
      run: pnpm install --frozen-lockfile
