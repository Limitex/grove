name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  release:
    name: Create Release
    needs: [ci]
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create.outputs.id }}
    steps:
      - uses: actions/checkout@v6
      - name: Create draft release with generated notes
        id: create
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --draft \
            --generate-notes \
            --title "Grove ${{ github.ref_name }}"
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/${{ github.ref_name }} --jq '.id')
          echo "id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.os }})
    needs: [release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          rust-targets: ${{ matrix.target }}

      - name: Build and upload assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.release.outputs.release-id }}
          args: --target ${{ matrix.target }}
