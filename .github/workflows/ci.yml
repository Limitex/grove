name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          rust-components: rustfmt, clippy

      - name: Build frontend
        run: pnpm run build

      # Generate TS bindings and verify they are up to date
      - name: Generate TypeScript bindings
        working-directory: src-tauri
        run: cargo test export_bindings_
      - name: Check generated bindings are up to date
        run: git diff --exit-code src/generated/

      # Frontend lint (matches: just lint)
      - name: TypeScript type check
        run: pnpm exec tsc --noEmit
      - name: Biome lint
        run: pnpm run lint
      - name: Knip (unused exports/deps)
        run: pnpm run knip

      # Backend lint (matches: just lint)
      - name: Cargo fmt check
        working-directory: src-tauri
        run: cargo fmt --all -- --check
      - name: Cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Build frontend
        run: pnpm run build
      - name: Cargo test
        working-directory: src-tauri
        run: cargo test

  build:
    name: Build (${{ matrix.os }})
    if: github.event_name == 'push'
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          rust-targets: ${{ matrix.target }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: grove-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*
          if-no-files-found: warn
